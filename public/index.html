<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify-like Music App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="global-top-bar">
      <div class="top-bar-left">
        <button class="icon-btn" title="More">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 13.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm7.5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm7.5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
        </button>
        <button class="nav-arrow" id="backBtn" disabled title="Go back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.03.47a.75.75 0 0 1 0 1.06L4.56 8l6.47 6.47a.75.75 0 1 1-1.06 1.06L2.44 8 9.97.47a.75.75 0 0 1 1.06 0z"/></svg>
        </button>
        <button class="nav-arrow" id="forwardBtn" disabled title="Go forward">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4.97.47a.75.75 0 0 0 0 1.06L11.44 8l-6.47 6.47a.75.75 0 1 0 1.06 1.06L13.56 8 6.03.47a.75.75 0 0 0-1.06 0z"/></svg>
        </button>
      </div>

      <div class="top-bar-center">
        <button class="top-home-btn" id="topNavHome" title="Home">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 3.247a1 1 0 0 0-1 0L4 7.577V20h4.5v-6a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v6H20V7.577l-7.5-4.33zm-2-1.732a3 3 0 0 1 3 0l7.5 4.33a2 2 0 0 1 1 1.732V21a1 1 0 0 1-1 1h-6.5a1 1 0 0 1-1-1v-6h-3v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.577a2 2 0 0 1 1-1.732l7.5-4.33z"/></svg>
        </button>
        <div class="global-search-container" id="search-container">
          <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.28 7.407-7.28s7.407 3.274 7.407 7.28-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.279z"/></svg>
          <input type="text" id="searchInput" placeholder="What do you want to play?">
          <span class="search-divider"></span>
          <button class="browse-btn" title="Browse">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z"/></svg>
          </button>
        </div>
      </div>

      <div class="top-bar-right">
        <button class="premium-btn">Explore Premium</button>
        <button class="icon-btn" title="Notifications"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5a5.5 5.5 0 0 0-5.5 5.5v5.042l-2.075 2.502A1.5 1.5 0 0 0 5.583 18h12.834a1.5 1.5 0 0 0 1.158-2.456L17.5 13.042V8A5.5 5.5 0 0 0 12 2.5zm0-2a7.5 7.5 0 0 1 7.5 7.5v4.54l2.404 2.902a3.5 3.5 0 0 1-2.703 5.725h-4.228a5 5 0 1 1-9.946 0H.797a3.5 3.5 0 0 1-2.703-5.725L.5 12.54V8a7.5 7.5 0 0 1 7.5-7.5zM12 21a3 3 0 0 0 2.83-2h-5.66A3 3 0 0 0 12 21z"/></svg></button>
        <button class="icon-btn" title="Friend Activity"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm-2 0a1 1 0 1 0-2 0 1 1 0 0 0 2 0zM7 9a4 4 0 0 0-4 4v3h10v-3a4 4 0 0 0-4-4H7zm-2 4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1H5v-1zm14 0a4 4 0 0 0-4-4h-2v2h2a2 2 0 0 1 2 2v1h-8v2h10v-3zm-2-8a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm-2 0a1 1 0 1 0-2 0 1 1 0 0 0 2 0z"/></svg></button>
        <div class="user-profile">
          <div class="avatar">U</div>
        </div>
      </div>
    </header>
    <nav class="sidebar">
      <div class="logo">
        <h2>Music App</h2>
      </div>
      <ul class="nav-links">
        <li class="active" id="nav-home">Home</li>
        <li id="nav-search">Search</li>
        <li id="nav-upload">Upload Song</li>
      </ul>
      <div class="library-section">
        <h3>Your Library</h3>
        <ul id="playlistList" class="nav-links">
          <li id="nav-liked">Liked Songs</li>
          <li id="nav-local">Local Uploads</li>
        </ul>

        <div class="user-playlists-section">
          <div class="user-playlists-header">
            <h3>Your Playlists</h3>
            <button id="createPlaylistBtn" title="Create Playlist">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
          </div>
          <div class="create-playlist-input" id="createPlaylistContainer" style="display: none;">
            <input type="text" id="newPlaylistName" placeholder="Playlist name..." autocomplete="off">
            <button id="confirmPlaylistBtn">Add</button>
          </div>
          <ul id="userPlaylistsContainer" class="nav-links user-playlists-list">
            <!-- Dynamically populated -->
          </ul>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="content-area" id="home-view">
        <h2>Good evening</h2>
        
        <section class="songs-section" id="recently-played-section" style="display: none; margin-bottom: 30px;">
          <h3>Jump Back In</h3>
          <div id="recentList" class="recent-grid">
            <!-- Recent songs will be loaded here -->
          </div>
        </section>
        
        <section class="upload-section minimal" id="upload-section" style="display: none;">
          <h3>Upload Music</h3>
          <form id="uploadForm" enctype="multipart/form-data" class="custom-form minimal-form">
            <div class="form-group row">
              <input type="text" id="title" name="title" placeholder="Song Title" required>
              <input type="text" id="artist" name="artist" placeholder="Artist" required>
            </div>
            <div class="form-group row file-inputs-minimal">
              <div class="minimal-upload-btn">
                <input type="file" id="songFile" name="audio" accept="audio/*" required class="hidden-input">
                <label for="songFile" class="minimal-label">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                  <span id="audioFileName">Select Audio...</span>
                </label>
              </div>
              <div class="minimal-upload-btn">
                <input type="file" id="coverFile" name="cover" accept="image/*" class="hidden-input">
                <label for="coverFile" class="minimal-label">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                  <span id="coverFileName">Select Thumbnail...</span>
                </label>
              </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Upload</button>
          </form>
          <div id="uploadMessage" class="upload-message"></div>
        </section>

        <section class="songs-section">
          <h3>Your Songs</h3>
          <div id="songList" class="songs-grid">
            <!-- Songs will be loaded here -->
          </div>
        </section>
      </div>
    </main>

    <div class="bottom-player">
      <div class="now-playing-info">
        <div class="album-art" id="player-art"></div>
        <div class="track-details">
          <div class="track-name" id="player-track">No song selected</div>
          <div class="track-artist" id="player-artist">Unknown Artist</div>
        </div>
      </div>
      
      <div class="player-controls">
        <div class="control-buttons">
          <button class="control-btn" id="shuffleBtn" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
          </button>
          <button class="control-btn" id="prevBtn" title="Previous" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h2v16H6V4zm14 0L9 12l11 8V4z"/></svg>
          </button>
          <button class="control-btn play-pause" id="playPauseBtn" title="Play/Pause">
            <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="control-btn" id="nextBtn" title="Next" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="control-btn" id="repeatBtn" title="Repeat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
          </button>
        </div>
        <div class="progress-container">
          <span id="currentTimeDisplay">0:00</span>
          <div class="progress-bar-wrapper" id="progressBarWrapper">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <span id="durationDisplay">0:00</span>
        </div>
        <audio id="player" controlsList="nodownload">
          Your browser does not support the audio element.
        </audio>
      </div>

      <div class="extra-controls">
        <div class="volume-container">
          <button class="volume-btn" id="muteBtn" title="Mute">
            <svg id="volHigh" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13.499 3.012a.5.5 0 0 0-.853-.35L6.611 8.5H2.5A2.5 2.5 0 0 0 0 11v2a2.5 2.5 0 0 0 2.5 2.5h4.111l6.035 5.838a.5.5 0 0 0 .853-.35V3.012zM15 6v12a5.98 5.98 0 0 0 0-12zm3 15a8.97 8.97 0 0 0 0-18v3a5.98 5.98 0 0 1 0 12v3z"/></svg>
            <svg id="volMute" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><path d="M13.499 3.012a.5.5 0 0 0-.853-.35L6.611 8.5H2.5A2.5 2.5 0 0 0 0 11v2a2.5 2.5 0 0 0 2.5 2.5h4.111l6.035 5.838a.5.5 0 0 0 .853-.35V3.012z M17.06 6.94a1.5 1.5 0 1 1 2.122 2.12L17.06 6.94zm2.122 7.94a1.5 1.5 0 1 1-2.122-2.12l2.122 2.12z"/></svg>
          </button>
          <div class="volume-bar-wrapper" id="volumeBarWrapper">
            <div class="volume-bar" id="volumeBar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
